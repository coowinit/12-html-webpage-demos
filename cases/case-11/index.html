<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Before After Comparison Section - Improved</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#ffffff;
      --text:#17324d;
      --muted:#17324d;
      --accent:#0f6a61;
      --container:1340px;
      --split:53%;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    }

    .page{
      padding:30px 18px 28px;
    }

    .container{
      width:100%;
      max-width:var(--container);
      margin:0 auto;
      background:#eee;
    }

    .section{
      display:grid;
      grid-template-columns:minmax(320px, 1.02fr) minmax(320px, .95fr);
      align-items:center;
      gap:52px;
    }

    .compare-wrap{
      position:relative;
      aspect-ratio:1.13 / 1;
      overflow:hidden;
      background:#e5e2db;
      user-select:none;
      touch-action:none;
      cursor:ew-resize;
      isolation:isolate;
    }

    .compare-image,
    .compare-overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    .compare-image img,
    .compare-overlay img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
      -webkit-user-drag:none;
      user-select:none;
    }

    .compare-overlay{
      z-index:2;
      clip-path:inset(0 calc(100% - var(--split)) 0 0);
      will-change:clip-path;
    }

    .divider{
      position:absolute;
      top:0;
      bottom:0;
      left:var(--split);
      width:2px;
      transform:translateX(-1px);
      z-index:3;
      background:rgba(255,255,255,.95);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.05),
        0 0 24px rgba(255,255,255,.28);
      pointer-events:none;
    }

    .handle{
      position:absolute;
      top:50%;
      left:var(--split);
      transform:translate(-50%, -50%);
      width:64px;
      height:64px;
      border:none;
      border-radius:999px;
      background:#fff;
      box-shadow:
        0 12px 26px rgba(0,0,0,.12),
        0 2px 6px rgba(0,0,0,.05);
      z-index:4;
      display:grid;
      place-items:center;
      cursor:ew-resize;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .compare-wrap:hover .handle{
      transform:translate(-50%, -50%) scale(1.03);
      box-shadow:
        0 16px 30px rgba(0,0,0,.14),
        0 2px 8px rgba(0,0,0,.05);
    }

    .compare-wrap.is-dragging .handle{
      transform:translate(-50%, -50%) scale(0.98);
      box-shadow:
        0 10px 22px rgba(0,0,0,.16),
        0 2px 6px rgba(0,0,0,.05);
    }

    .handle-icon{
      position:relative;
      width:32px;
      height:24px;
      color:var(--accent);
    }

    .handle-icon::before,
    .handle-icon::after{
      content:"";
      position:absolute;
      top:50%;
      width:11px;
      height:11px;
      border-top:3px solid currentColor;
      border-right:3px solid currentColor;
      margin-top:-5.5px;
    }

    .handle-icon::before{
      left:0;
      transform:rotate(-135deg);
    }

    .handle-icon::after{
      right:0;
      transform:rotate(45deg);
    }

    .handle-line{
      position:absolute;
      left:50%;
      top:50%;
      width:3px;
      height:24px;
      background:currentColor;
      transform:translate(-50%, -50%);
      border-radius:999px;
    }

    .compare-label{
      position:absolute;
      top:18px;
      z-index:5;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(6px);
      color:#17324d;
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      box-shadow:0 4px 10px rgba(0,0,0,.05);
      pointer-events:none;
    }

    .compare-label.before{ left:18px; }
    .compare-label.after{ right:18px; }

    .range{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      margin:0;
      opacity:0;
      cursor:ew-resize;
      z-index:6;
    }

    .content{
      padding:46px 48px 46px 0;
    }

    .title{
      margin:0 0 34px;
      color:var(--muted);
      font-size:31px;
      line-height:1.36;
      font-weight:400;
      letter-spacing:-0.03em;
      max-width:580px;
    }

    .benefits{
      display:grid;
      gap:34px;
      margin:0;
      padding:0;
      list-style:none;
      max-width:600px;
    }

    .benefit{
      display:grid;
      grid-template-columns:46px 1fr;
      gap:18px;
      align-items:center;
    }

    .benefit-text{
      font-size:18px;
      line-height:1.45;
      color:var(--muted);
      font-weight:400;
    }

    .icon{
      width:46px;
      height:46px;
      color:var(--accent);
      flex:0 0 auto;
    }

    .assistive{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    @media (max-width: 980px){
      .section{
        grid-template-columns:1fr;
        gap:20px;
      }

      .content{
        padding:8px 10px 28px;
      }

      .title{
        max-width:none;
        font-size:29px;
        margin-bottom:26px;
      }
    }

    @media (max-width: 640px){
      .page{
        padding:14px;
      }

      .container{
        background:transparent;
      }

      .section{
        gap:18px;
      }

      .compare-wrap{
        aspect-ratio:1 / 1.05;
        border-radius:12px;
      }

      .handle{
        width:58px;
        height:58px;
      }

      .compare-label{
        top:12px;
        padding:6px 9px;
        font-size:11px;
      }

      .content{
        padding:0;
      }

      .title{
        font-size:22px;
        line-height:1.32;
        margin-bottom:22px;
      }

      .benefits{
        gap:22px;
      }

      .benefit{
        grid-template-columns:38px 1fr;
        gap:14px;
      }

      .icon{
        width:38px;
        height:38px;
      }

      .benefit-text{
        font-size:16px;
        line-height:1.45;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="container">
      <div class="section">
        <div class="compare-wrap" id="compareWrap">
          <span class="compare-label before">Composite</span>
          <span class="compare-label after">Wood</span>

          <div class="compare-image">
            <img id="afterImage" alt="Trex composite decking close-up">
          </div>

          <div class="compare-overlay" id="compareOverlay" aria-hidden="true">
            <img id="beforeImage" alt="">
          </div>

          <div class="divider" aria-hidden="true"></div>

          <div class="handle" id="compareHandle" aria-hidden="true">
            <span class="handle-icon">
              <span class="handle-line"></span>
            </span>
          </div>

          <label class="assistive" for="compareRange">滑动查看前后对比</label>
          <input
            id="compareRange"
            class="range"
            type="range"
            min="0"
            max="100"
            step="0.1"
            value="53"
            aria-label="Drag to compare before and after decking"
          />
        </div>

        <div class="content">
          <h1 class="title">Trex<sup>®</sup> Composite Decking Offers Unmatched Benefits Over Traditional Wood</h1>

          <ul class="benefits">
            <li class="benefit">
              <svg class="icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <circle cx="24" cy="24" r="21" stroke="currentColor" stroke-width="1.5"/>
                <path d="M14 31l17-17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M16.5 15.5l16 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity=".85"/>
                <path d="M10.5 27.5l10.5 10.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M24 13l10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M33.5 12.5l2 2c1.8 1.8 1.8 4.7 0 6.5l-2.5 2.5-8.5-8.5 2.5-2.5c1.8-1.8 4.7-1.8 6.5 0Z" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <div class="benefit-text">No sanding, sealing, or painting—ever</div>
            </li>

            <li class="benefit">
              <svg class="icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <rect x="10" y="4" width="28" height="40" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M15 7v34M19 7v34M24 7v34M29 7v34M33 7v34" stroke="currentColor" stroke-width="1.25"/>
                <path d="M10 11h28M10 16h28M10 21h28M10 26h28M10 31h28M10 36h28" stroke="currentColor" stroke-width="1"/>
                <path d="M16 10c2 3 2 7 0 10M24 18c2 3 2 7 0 10M30 12c2 3 2 7 0 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <div class="benefit-text">Resistant to rot, fading, staining, mold, and splintering</div>
            </li>

            <li class="benefit">
              <svg class="icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <path d="M24 44V26" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                <path d="M12 26h24" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                <path d="M24 26c-6.2-1.2-11-7-11-14 5.2 0 9.8 2.7 11 8.4C25.2 14.7 29.8 12 35 12c0 7-4.8 12.8-11 14Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M24 23c-4.5-1-8-5.2-8-10 4.2 0 7.2 2.5 8 6.3C24.8 15.5 27.8 13 32 13c0 4.8-3.5 9-8 10Z" stroke="currentColor" stroke-width="1.2" opacity=".9"/>
              </svg>
              <div class="benefit-text">Made with up to 95% recycled materials.</div>
            </li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <script>
    const afterImage = document.getElementById('afterImage');
    const beforeImage = document.getElementById('beforeImage');
    afterImage.src = '../../assets/images/after.avif';
    beforeImage.src = '../../assets/images/before.avif';

    const wrap = document.getElementById('compareWrap');
    const range = document.getElementById('compareRange');
    const handle = document.getElementById('compareHandle');

    let isDragging = false;
    let rafId = null;
    let pendingValue = 53;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function renderSplit(value) {
      const clamped = clamp(value, 0, 100);
      wrap.style.setProperty('--split', clamped + '%');
      range.value = clamped;
    }

    function scheduleRender(value) {
      pendingValue = value;
      if (rafId) return;
      rafId = requestAnimationFrame(() => {
        renderSplit(pendingValue);
        rafId = null;
      });
    }

    function getSplitFromClientX(clientX) {
      const rect = wrap.getBoundingClientRect();
      return ((clientX - rect.left) / rect.width) * 100;
    }

    function beginDrag(clientX) {
      isDragging = true;
      wrap.classList.add('is-dragging');
      scheduleRender(getSplitFromClientX(clientX));
    }

    function moveDrag(clientX) {
      if (!isDragging) return;
      scheduleRender(getSplitFromClientX(clientX));
    }

    function stopDragging() {
      isDragging = false;
      wrap.classList.remove('is-dragging');
    }

    wrap.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      wrap.setPointerCapture(event.pointerId);
      beginDrag(event.clientX);
    });

    wrap.addEventListener('pointermove', (event) => {
      moveDrag(event.clientX);
    });

    wrap.addEventListener('pointerup', stopDragging);
    wrap.addEventListener('pointercancel', stopDragging);
    wrap.addEventListener('lostpointercapture', stopDragging);

    range.addEventListener('input', (event) => {
      scheduleRender(Number(event.target.value));
    });

    handle.addEventListener('keydown', (event) => {
      const current = Number(range.value);
      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        scheduleRender(current - 2);
      }
      if (event.key === 'ArrowRight') {
        event.preventDefault();
        scheduleRender(current + 2);
      }
    });

    renderSplit(53);
  </script>
</body>
</html>
